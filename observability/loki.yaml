# Loki config with OTLP log ingestion enabled (allow_structured_metadata required for OTLP).
# Based on Loki docker default; see https://grafana.com/docs/loki/latest/send-data/otel
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  ring:
    kvstore:
      store: inmemory

limits_config:
  allow_structured_metadata: true  # Required for OTLP log ingestion (Loki 3.x)

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093
