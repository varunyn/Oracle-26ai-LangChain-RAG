apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      httpMethod: GET
      # Disable gRPC streaming so Grafana uses HTTP only (port 3200 is HTTP, not gRPC)
      streamingEnabled:
        search: false
